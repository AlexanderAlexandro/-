<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Games Hub Post Purchase Demo</title>
  <style>
    :root{
      --bg:#0d1018;
      --bg-soft:#141a26;
      --panel:rgba(15,19,29,.82);
      --panel-strong:rgba(11,14,22,.92);
      --panel-line:rgba(255,255,255,.08);
      --surface:#171d29;
      --surface-2:#1c2332;
      --surface-3:#232d3f;
      --text:#f4f6fb;
      --text-soft:#b5bfd4;
      --text-dim:#7d88a1;
      --accent:#ffb648;
      --accent-2:#ff8c3a;
      --accent-soft:rgba(255,182,72,.16);
      --success:#73db87;
      --danger:#ff6b6b;
      --toast:#f7f9fc;
      --toast-text:#1d2433;
      --shadow-xl:0 30px 80px rgba(0,0,0,.42);
      --shadow-lg:0 18px 50px rgba(0,0,0,.28);
      --shadow-md:0 12px 30px rgba(0,0,0,.22);
      --radius-xl:28px;
      --radius-lg:22px;
      --radius-md:18px;
      --radius-sm:14px;
      --ease:cubic-bezier(.22,.84,.24,1);
    }

    *{box-sizing:border-box}

    html,body{height:100%}

    body{
      margin:0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at top left, rgba(255,182,72,.13), transparent 26%),
        radial-gradient(circle at 84% 8%, rgba(82,139,255,.14), transparent 24%),
        linear-gradient(180deg, #0b0f17 0%, #111726 100%);
      overflow-x:hidden;
    }

    body::before{
      content:"";
      position:fixed;
      inset:0;
      background:
        linear-gradient(rgba(255,255,255,.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.04) 1px, transparent 1px);
      background-size:28px 28px;
      mask-image:linear-gradient(180deg, rgba(0,0,0,.32), transparent 78%);
      pointer-events:none;
    }

    button{font:inherit}

    .layout{
      display:grid;
      grid-template-columns:332px minmax(0,1fr);
      gap:24px;
      min-height:100vh;
      padding:22px;
      align-items:start;
    }

    .sidebar,
    .notes{
      background:linear-gradient(180deg, rgba(24,30,44,.88), rgba(14,18,28,.88));
      border:1px solid var(--panel-line);
      box-shadow:var(--shadow-lg);
      backdrop-filter:blur(18px);
    }

    .sidebar{
      position:sticky;
      top:22px;
      border-radius:26px;
      padding:18px;
    }

    .eyebrow{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:7px 11px;
      border-radius:999px;
      background:rgba(255,255,255,.06);
      color:var(--text-soft);
      font-size:11px;
      font-weight:700;
      letter-spacing:.08em;
      text-transform:uppercase;
    }

    .eyebrow::before{
      content:"";
      width:7px;
      height:7px;
      border-radius:50%;
      background:linear-gradient(180deg, var(--accent), var(--accent-2));
      box-shadow:0 0 0 4px rgba(255,182,72,.12);
    }

    .sidebar h1{
      margin:14px 0 10px;
      font-size:24px;
      line-height:1.05;
      letter-spacing:-.04em;
    }

    .sidebar p{
      margin:0;
      color:var(--text-soft);
      line-height:1.55;
      font-size:14px;
    }

    .group{margin-top:18px}

    .group-title{
      margin-bottom:10px;
      color:var(--text-dim);
      font-size:11px;
      font-weight:800;
      letter-spacing:.12em;
      text-transform:uppercase;
    }

    .btn-grid{display:grid;gap:9px}

    button{
      appearance:none;
      border:1px solid transparent;
      border-radius:16px;
      min-height:46px;
      padding:11px 14px;
      cursor:pointer;
      color:var(--text);
      background:linear-gradient(180deg, #20283a, #151c2a);
      box-shadow:inset 0 1px 0 rgba(255,255,255,.05), 0 8px 18px rgba(0,0,0,.18);
      transition:transform .18s ease, box-shadow .18s ease, filter .18s ease, background .18s ease, border-color .18s ease, opacity .18s ease;
    }

    button:hover{
      transform:translateY(-1px);
      box-shadow:inset 0 1px 0 rgba(255,255,255,.06), 0 12px 24px rgba(0,0,0,.2);
    }

    button:active{
      transform:translateY(1px) scale(.985);
    }

    button.secondary{
      background:linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.04));
      border-color:rgba(255,255,255,.08);
      color:#edf1fa;
    }

    button.warning{
      background:linear-gradient(180deg, #ffc96a, #ff9e44);
      color:#302102;
      font-weight:800;
      box-shadow:0 12px 24px rgba(255,156,68,.22);
    }

    button.ghost{
      background:transparent;
      border-color:rgba(255,255,255,.1);
      color:var(--text-soft);
      box-shadow:none;
    }

    .status{
      margin-top:16px;
      padding:14px;
      border-radius:18px;
      background:linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.03));
      border:1px solid rgba(255,255,255,.08);
      color:var(--text-soft);
      font-size:13px;
      line-height:1.55;
    }

    .status strong{color:var(--text)}

    .main{
      min-width:0;
      display:flex;
      align-items:flex-start;
      justify-content:center;
    }

    .scene{
      width:min(1140px, 100%);
      display:grid;
      grid-template-columns:430px minmax(340px,1fr);
      gap:28px;
      align-items:start;
    }

    .phone-wrap{
      display:flex;
      justify-content:center;
      align-items:flex-start;
    }

    .phone-shell{
      position:relative;
      padding:16px;
      border-radius:42px;
      background:linear-gradient(180deg, rgba(255,255,255,.07), rgba(255,255,255,.02));
      border:1px solid rgba(255,255,255,.07);
      box-shadow:var(--shadow-xl);
    }

    .phone{
      width:390px;
      height:844px;
      border-radius:36px;
      padding:10px;
      background:
        linear-gradient(145deg, rgba(255,255,255,.1), rgba(255,255,255,.03)),
        #050608;
      box-shadow:inset 0 0 0 1px rgba(255,255,255,.06), 0 28px 80px rgba(0,0,0,.45);
      position:relative;
    }

    .phone::before{
      content:"";
      position:absolute;
      inset:10px;
      border-radius:28px;
      border:1px solid rgba(255,255,255,.05);
      pointer-events:none;
    }

    .screen{
      position:relative;
      width:100%;
      height:100%;
      overflow:hidden;
      border-radius:27px;
      background:#0e1320;
      isolation:isolate;
    }

    .screen::before{
      content:"";
      position:absolute;
      inset:0;
      background:
        radial-gradient(circle at top, rgba(255,255,255,.08), transparent 30%),
        linear-gradient(180deg, rgba(255,255,255,.03), transparent 25%);
      pointer-events:none;
      z-index:0;
    }

    .notch{
      position:absolute;
      top:7px;
      left:50%;
      transform:translateX(-50%);
      width:142px;
      height:22px;
      border-radius:0 0 18px 18px;
      background:#050608;
      z-index:25;
    }

    .content{
      position:absolute;
      inset:0 0 60px 0;
      overflow:hidden;
    }

    .browser{
      position:absolute;
      left:14px;
      right:14px;
      bottom:14px;
      z-index:24;
      height:44px;
      border-radius:18px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:0 14px;
      background:rgba(7,10,15,.9);
      border:1px solid rgba(255,255,255,.08);
      color:#dbe2f0;
      backdrop-filter:blur(14px);
      box-shadow:0 10px 24px rgba(0,0,0,.26);
      font-size:13px;
    }

    .url{
      padding:5px 10px;
      border-radius:999px;
      background:rgba(255,255,255,.06);
      color:#eef2fa;
      font-weight:600;
    }

    .notes{
      border-radius:28px;
      padding:26px;
      min-height:420px;
    }

    .state-badge{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:8px 12px;
      border-radius:999px;
      background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.08);
      color:var(--text-soft);
      font-size:13px;
      margin-bottom:14px;
    }

    .notes h2{
      margin:0 0 12px;
      font-size:34px;
      line-height:1;
      letter-spacing:-.04em;
    }

    .notes p{
      margin:0 0 14px;
      color:var(--text-soft);
      font-size:16px;
      line-height:1.62;
    }

    .notes .muted{color:var(--text-dim)}

    body.demo-clean .sidebar,
    body.demo-clean .notes{display:none}
    body.demo-clean .layout{grid-template-columns:1fr;padding:18px}
    body.demo-clean .main{align-items:center;min-height:calc(100vh - 36px)}
    body.demo-clean .scene{grid-template-columns:1fr}

    .demo-toggle-fab{
      position:fixed;
      top:18px;
      right:18px;
      z-index:9999;
      display:none;
      min-height:42px;
      padding:10px 14px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.08);
      background:rgba(14,18,28,.78);
      color:#f7f8fc;
      backdrop-filter:blur(14px);
      box-shadow:var(--shadow-md);
      font-size:14px;
      font-weight:700;
    }

    body.demo-clean .demo-toggle-fab{display:block}

    .clickable{
      transition:transform .18s ease, filter .18s ease, opacity .18s ease, box-shadow .18s ease;
      transform-origin:center;
    }

    .pressing{
      transform:scale(.968)!important;
      filter:brightness(.97)!important;
    }

    .success-screen{
      position:absolute;
      inset:0;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:14px;
      padding:28px;
      text-align:center;
      color:#fff;
      background:
        radial-gradient(circle at 50% 30%, rgba(255,255,255,.15), transparent 22%),
        radial-gradient(circle at 50% 62%, rgba(255,182,72,.18), transparent 40%),
        linear-gradient(180deg, #2a2f3d 0%, #1d2230 55%, #131925 100%);
      animation:screenFade .55s var(--ease);
    }

    .success-ring{
      width:96px;
      height:96px;
      display:grid;
      place-items:center;
      border-radius:50%;
      background:
        radial-gradient(circle at 30% 30%, rgba(255,255,255,.24), transparent 48%),
        linear-gradient(180deg, #ffe08a, #ffb648);
      color:#332400;
      font-size:44px;
      font-weight:900;
      box-shadow:0 20px 50px rgba(255,182,72,.28);
      animation:rewardPulse 1.6s ease-in-out infinite;
    }

    .confetti{
      color:#ffd88d;
      letter-spacing:.35em;
      font-size:18px;
      text-transform:uppercase;
      opacity:.82;
    }

    .success-title{
      font-size:34px;
      line-height:1;
      font-weight:900;
      letter-spacing:-.05em;
    }

    .success-sub{
      max-width:260px;
      color:rgba(255,255,255,.78);
      font-size:15px;
      line-height:1.5;
    }

    @keyframes rewardPulse{
      0%,100%{transform:scale(1)}
      50%{transform:scale(1.04)}
    }

    @keyframes screenFade{
      from{opacity:0;transform:scale(.985)}
      to{opacity:1;transform:scale(1)}
    }

    .store{
      height:100%;
      color:#fff;
      background:
        radial-gradient(circle at 50% -10%, rgba(255,182,72,.12), transparent 28%),
        linear-gradient(180deg, #141926 0%, #0d121d 100%);
      animation:screenFade .45s var(--ease);
    }

    .topbar{
      position:relative;
      padding:18px 16px 14px;
      background:
        linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.02)),
        linear-gradient(180deg, #1d2434 0%, #141b29 100%);
      border-bottom:1px solid rgba(255,255,255,.06);
      overflow:hidden;
    }

    .topbar::after{
      content:"";
      position:absolute;
      inset:auto -40px -80px auto;
      width:180px;
      height:180px;
      border-radius:50%;
      background:radial-gradient(circle, rgba(255,182,72,.2), transparent 68%);
      pointer-events:none;
    }

    .toprow{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:12px;
      position:relative;
      z-index:1;
    }

    .left-icons{
      display:flex;
      gap:12px;
    }

    .nav-mini{
      min-width:58px;
      padding:10px 10px 8px;
      border-radius:16px;
      background:rgba(255,255,255,.05);
      border:1px solid rgba(255,255,255,.06);
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:4px;
      color:#eef2fb;
      font-size:10px;
      font-weight:700;
      letter-spacing:.04em;
    }

    .nav-mini .icon{
      font-size:20px;
      line-height:1;
    }

    .profile{
      display:flex;
      align-items:center;
      gap:10px;
    }

    .profile-copy{
      text-align:right;
    }

    .profile-label{
      color:#f5c872;
      font-size:11px;
      font-weight:800;
      letter-spacing:.1em;
      text-transform:uppercase;
    }

    .profile-name{
      margin-top:4px;
      font-size:15px;
      font-weight:800;
      color:#fff;
    }

    .profile-meta{
      margin-top:2px;
      color:#a9b3c8;
      font-size:11px;
      font-weight:600;
    }

    .avatar{
      width:42px;
      height:42px;
      border-radius:50%;
      display:grid;
      place-items:center;
      background:
        radial-gradient(circle at 28% 28%, #ffe6a8, #b86a48 62%, #693a29 100%);
      color:#46210d;
      font-size:18px;
      border:2px solid rgba(255,200,108,.4);
      box-shadow:0 10px 20px rgba(0,0,0,.24);
      flex:none;
    }

    .vip-banner{
      margin-top:14px;
      position:relative;
      z-index:1;
      min-height:62px;
      border-radius:20px;
      padding:12px 14px 12px 72px;
      display:flex;
      align-items:center;
      font-size:12px;
      line-height:1.3;
      font-weight:800;
      color:#ffe5a1;
      background:
        linear-gradient(90deg, rgba(255,255,255,.08), transparent 24%, transparent 76%, rgba(255,255,255,.08)),
        linear-gradient(90deg, #7c0f16 0%, #ac1b20 40%, #d14f2e 100%);
      border:1px solid rgba(255,255,255,.08);
      box-shadow:0 16px 28px rgba(0,0,0,.18);
    }

    .vip-banner::before{
      content:"VIP";
      position:absolute;
      left:14px;
      width:44px;
      height:44px;
      display:grid;
      place-items:center;
      border-radius:14px;
      background:linear-gradient(180deg, #ffdd8b, #d79d32);
      color:#4b3103;
      font-size:12px;
      font-weight:900;
      box-shadow:0 10px 20px rgba(0,0,0,.2);
    }

    .store-body{
      position:relative;
      height:100%;
      padding:18px 12px 12px;
      overflow:hidden;
    }

    .store-section{
      margin-bottom:18px;
    }

    .section-meta{
      display:flex;
      align-items:flex-end;
      justify-content:space-between;
      gap:12px;
      padding:0 4px;
      margin-bottom:12px;
    }

    .section-title{
      margin:0;
      font-size:28px;
      line-height:.98;
      letter-spacing:-.05em;
      font-weight:900;
    }

    .section-sub{
      margin-top:5px;
      font-size:11px;
      font-weight:700;
      letter-spacing:.08em;
      color:#8f9ab1;
      text-transform:uppercase;
    }

    .section-tag{
      padding:8px 11px;
      border-radius:999px;
      background:rgba(255,255,255,.05);
      border:1px solid rgba(255,255,255,.07);
      color:#e4a84c;
      font-size:11px;
      font-weight:800;
      white-space:nowrap;
    }

    .cards{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
      padding:0 4px;
    }

    .product{
      position:relative;
      min-height:546px;
      border-radius:24px;
      overflow:hidden;
      border:1px solid rgba(255,255,255,.08);
      box-shadow:0 18px 28px rgba(0,0,0,.24);
      display:flex;
      flex-direction:column;
      background:
        radial-gradient(circle at top, rgba(255,255,255,.18), transparent 28%),
        linear-gradient(180deg, #386879 0%, #234356 100%);
    }

    .product.plus{
      background:
        radial-gradient(circle at top, rgba(255,255,255,.18), transparent 28%),
        linear-gradient(180deg, #6a3e84 0%, #3e2550 100%);
    }

    .product::after{
      content:"";
      position:absolute;
      inset:auto -40px -54px auto;
      width:130px;
      height:130px;
      border-radius:50%;
      background:radial-gradient(circle, rgba(255,255,255,.16), transparent 68%);
      pointer-events:none;
    }

    .product-topline{
      padding:14px 14px 0;
      color:#ffe39a;
      font-size:11px;
      font-weight:900;
      letter-spacing:.08em;
      text-transform:uppercase;
    }

    .product-art{
      height:152px;
      display:flex;
      align-items:flex-end;
      justify-content:center;
      padding-top:12px;
      font-size:74px;
      text-shadow:0 12px 22px rgba(0,0,0,.22);
    }

    .product-body{
      padding:10px 14px 0;
      text-align:center;
    }

    .product-name{
      font-size:24px;
      line-height:.94;
      font-weight:900;
      letter-spacing:-.04em;
      margin-bottom:8px;
      color:#ffe39a;
      text-transform:uppercase;
    }

    .product-sub{
      color:#f0f4fb;
      font-size:12px;
      line-height:1.35;
    }

    .product-stats{
      margin-top:16px;
      color:#fff;
      font-size:13px;
      font-weight:800;
      line-height:1.35;
    }

    .product-perks{
      margin:14px 14px 0;
      padding:10px 12px;
      border-radius:16px;
      background:rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.08);
      color:#eef3fb;
      font-size:11px;
      line-height:1.45;
      display:grid;
      gap:4px;
    }

    .product-cta{
      margin-top:auto;
      padding:12px;
      display:grid;
      gap:7px;
      place-items:center;
      text-align:center;
      color:#ffeab8;
      background:linear-gradient(180deg, rgba(135,14,21,.95), rgba(94,8,14,.98));
      border-top:1px solid rgba(255,255,255,.08);
      box-shadow:inset 0 1px 0 rgba(255,255,255,.06);
      cursor:pointer;
    }

    .product-cta .bonus{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:6px 10px;
      border-radius:999px;
      background:rgba(255,255,255,.1);
      font-size:14px;
      font-weight:900;
      line-height:1;
    }

    .product-cta .label{
      font-size:12px;
      font-weight:900;
      letter-spacing:.08em;
      text-transform:uppercase;
    }

    .product-price{
      padding:14px 12px 16px;
      text-align:center;
      color:#fff;
      font-size:28px;
      font-weight:900;
      letter-spacing:-.04em;
    }

    .mini-cards{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
      padding:0 4px;
      opacity:.92;
    }

    .mini-card{
      min-height:124px;
      padding:14px;
      border-radius:20px;
      border:1px solid rgba(255,255,255,.08);
      background:linear-gradient(180deg, rgba(255,255,255,.07), rgba(255,255,255,.04));
      box-shadow:0 14px 24px rgba(0,0,0,.16);
    }

    .mini-card .mini-top{
      color:#ffe39a;
      font-size:11px;
      font-weight:800;
      letter-spacing:.08em;
      text-transform:uppercase;
    }

    .mini-card .mini-art{
      margin-top:16px;
      font-size:32px;
      text-align:center;
    }

    .bottom-pill{
      position:absolute;
      left:50%;
      transform:translateX(-50%);
      bottom:66px;
      z-index:10;
      width:58px;
      height:42px;
      display:grid;
      place-items:center;
      border-radius:14px;
      background:linear-gradient(180deg, #ffd88b, #d4a34d);
      color:#5b3908;
      font-size:18px;
      border:2px solid rgba(53,33,8,.16);
      box-shadow:0 12px 20px rgba(0,0,0,.2);
    }

    .bottom-nav{
      position:absolute;
      left:50%;
      transform:translateX(-50%);
      bottom:66px;
      z-index:9;
      width:244px;
      height:56px;
      display:flex;
      align-items:center;
      justify-content:space-around;
      border-radius:20px;
      background:linear-gradient(180deg, #3c3248, #2a2234);
      border:1px solid rgba(255,214,140,.36);
      color:#d9b16b;
      box-shadow:0 -12px 26px rgba(0,0,0,.24);
      font-size:22px;
    }

    .overlay{
      position:absolute;
      inset:0;
      z-index:13;
      background:rgba(6,8,13,.42);
      backdrop-filter:blur(6px) saturate(1.08);
      animation:overlayIn .28s var(--ease);
    }

    @keyframes overlayIn{
      from{opacity:0;backdrop-filter:blur(0)}
      to{opacity:1;backdrop-filter:blur(6px)}
    }

    .popup-wrap{
      position:absolute;
      inset:0;
      z-index:14;
      display:flex;
      align-items:flex-start;
      justify-content:center;
      padding:142px 14px 0;
      pointer-events:none;
    }

    .popup{
      width:100%;
      background:linear-gradient(180deg, #f6f8fb 0%, #edf1f7 100%);
      color:#172033;
      border-radius:24px;
      border:1px solid rgba(255,255,255,.75);
      box-shadow:0 24px 50px rgba(0,0,0,.34);
      overflow:hidden;
      pointer-events:auto;
      animation:popupIn .34s var(--ease);
    }

    .popup.exit{
      animation:popupOut .24s ease forwards;
    }

    @keyframes popupIn{
      from{opacity:0;transform:translateY(22px) scale(.965)}
      to{opacity:1;transform:translateY(0) scale(1)}
    }

    @keyframes popupOut{
      from{opacity:1;transform:translateY(0) scale(1)}
      to{opacity:0;transform:translateY(18px) scale(.97)}
    }

    .popup-inner{
      display:grid;
      gap:12px;
      padding:14px;
    }

    .popup-top{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      padding:4px 2px 0;
    }

    .popup-thanks{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:8px 12px;
      border-radius:999px;
      background:#edf8f0;
      color:#2b7b3b;
      border:1px solid rgba(115,219,135,.34);
      font-size:12px;
      font-weight:800;
    }

    .popup-thanks::before{
      content:"✓";
      width:18px;
      height:18px;
      display:grid;
      place-items:center;
      border-radius:50%;
      background:#73db87;
      color:#15381c;
      font-size:11px;
    }

    .popup-chip{
      padding:8px 11px;
      border-radius:999px;
      background:#fff8ea;
      color:#9b6515;
      border:1px solid rgba(255,182,72,.36);
      font-size:11px;
      font-weight:800;
      text-transform:uppercase;
      letter-spacing:.08em;
      white-space:nowrap;
    }

    .popup-hero{
      padding:18px;
      border-radius:22px;
      background:
        radial-gradient(circle at top right, rgba(255,182,72,.22), transparent 36%),
        linear-gradient(180deg, #192131 0%, #101722 100%);
      color:#f7f9fd;
      overflow:hidden;
      position:relative;
    }

    .popup-hero::after{
      content:"";
      position:absolute;
      inset:auto -20px -42px auto;
      width:120px;
      height:120px;
      border-radius:50%;
      background:radial-gradient(circle, rgba(255,182,72,.28), transparent 68%);
      pointer-events:none;
    }

    .popup-title{
      margin:0;
      font-size:30px;
      line-height:.98;
      letter-spacing:-.05em;
      font-weight:900;
      max-width:240px;
    }

    .popup-copy{
      margin-top:10px;
      max-width:270px;
      color:rgba(244,246,251,.78);
      font-size:14px;
      line-height:1.5;
    }

    .popup-benefit{
      display:grid;
      grid-template-columns:1fr auto;
      gap:12px;
      align-items:center;
      padding:16px 18px;
      border-radius:22px;
      background:#fff;
      border:1px solid rgba(17,24,39,.08);
      box-shadow:0 10px 24px rgba(23,32,51,.08);
    }

    .benefit-copy{
      display:grid;
      gap:6px;
    }

    .benefit-label{
      color:#6f7a91;
      font-size:12px;
      font-weight:800;
      letter-spacing:.08em;
      text-transform:uppercase;
    }

    .benefit-title{
      font-size:19px;
      line-height:1.2;
      font-weight:800;
    }

    .benefit-sub{
      color:#59637a;
      font-size:14px;
      line-height:1.45;
    }

    .reward-badge{
      min-width:114px;
      padding:14px 12px;
      border-radius:18px;
      text-align:center;
      background:
        radial-gradient(circle at top, rgba(255,255,255,.28), transparent 48%),
        linear-gradient(180deg, #ffd47c, #ffb84a);
      color:#392805;
      box-shadow:0 14px 24px rgba(255,182,72,.26);
      animation:rewardPulse 1.4s ease-in-out infinite;
    }

    .reward-badge strong{
      display:block;
      font-size:24px;
      line-height:1;
      letter-spacing:-.04em;
    }

    .reward-badge span{
      display:block;
      margin-top:5px;
      font-size:11px;
      font-weight:800;
      letter-spacing:.08em;
      text-transform:uppercase;
    }

    .popup-actions{
      display:flex;
      gap:12px;
      align-items:center;
      justify-content:center;
      padding-top:2px;
    }

    .popup-actions .optout{
      flex:1;
      min-width:0;
      background:#f1f4f9;
      color:#384257;
      border:1px solid rgba(17,24,39,.08);
      box-shadow:none;
      font-weight:700;
    }

    .popup-actions .ok{
      min-width:176px;
      background:linear-gradient(180deg, #ffd26f, #ffb648);
      color:#382704;
      font-weight:900;
      box-shadow:0 10px 0 rgba(180,119,15,.28);
    }

    .popup-actions.single .ok{
      min-width:220px;
    }

    .popup-footnote{
      color:#7a8397;
      text-align:center;
      font-size:12px;
      line-height:1.45;
      padding:0 8px 2px;
    }

    .toast{
      position:absolute;
      top:170px;
      left:14px;
      width:270px;
      z-index:14;
      display:flex;
      gap:12px;
      align-items:flex-start;
      padding:12px 14px;
      border-radius:20px;
      background:rgba(247,249,252,.95);
      color:var(--toast-text);
      border:1px solid rgba(255,255,255,.75);
      box-shadow:0 16px 32px rgba(0,0,0,.18);
      backdrop-filter:blur(14px);
      overflow:hidden;
      cursor:pointer;
      animation:toastIn .34s var(--ease);
    }

    .toast::before{
      content:"";
      position:absolute;
      inset:0 auto 0 0;
      width:4px;
      background:linear-gradient(180deg, #73db87, #49b764);
    }

    .toast .icon{
      width:34px;
      height:34px;
      display:grid;
      place-items:center;
      border-radius:50%;
      background:#e7f6ea;
      color:#2d8740;
      font-size:17px;
      font-weight:900;
      flex:none;
    }

    .toast .t1{
      font-size:13px;
      font-weight:800;
      color:#39445b;
    }

    .toast .t2{
      margin-top:4px;
      font-size:14px;
      line-height:1.35;
      color:#1f2634;
    }

    .toast .hint{
      margin-top:6px;
      color:#768198;
      font-size:11px;
      font-weight:700;
    }

    @keyframes toastIn{
      from{opacity:0;transform:translateY(-8px) scale(.985)}
      to{opacity:1;transform:translateY(0) scale(1)}
    }

    @media (max-width:1180px){
      .layout{grid-template-columns:1fr}
      .sidebar{position:static}
      .scene{grid-template-columns:1fr;justify-items:center}
      .notes{width:min(760px,100%)}
    }

    @media (max-width:560px){
      .layout{padding:12px}
      .scene{gap:18px}
      .sidebar,.notes{border-radius:22px}
      .sidebar{padding:16px}
      .notes{padding:20px}
      .notes h2{font-size:28px}
      .phone-shell{padding:10px;width:100%}
      .phone{width:100%;max-width:390px;height:800px}
      .popup-wrap{padding-top:132px}
      .popup-title{font-size:26px}
      .popup-benefit{grid-template-columns:1fr}
      .reward-badge{width:100%}
      .popup-actions{flex-direction:column}
      .popup-actions .ok,
      .popup-actions .optout,
      .popup-actions.single .ok{width:100%;min-width:0}
      .toast{width:calc(100% - 28px)}
    }
  </style>
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="eyebrow">Games Hub Demo</div>
      <h1>Постпокупочный флоу в Games Hub</h1>
      <p>Усиленный интерактивный прототип для внутреннего демо: сохраняет текущую логику сценария и показывает, как GH может аккуратно дожимать ценность после оплаты.</p>

      <div class="group">
        <div class="group-title">Основные состояния</div>
        <div class="btn-grid">
          <button onclick="go('success')">1. Экран успешного платежа</button>
          <button onclick="go('store-first')">2. Магазин + попап 1</button>
          <button onclick="go('store-second')">3. Магазин + попап 2+</button>
          <button onclick="go('store-toast')">4. Магазин + лёгкий toast</button>
          <button class="secondary" onclick="simulateFlow()">▶ Пройти сценарий автоматически</button>
        </div>
      </div>

      <div class="group">
        <div class="group-title">Действия игрока</div>
        <div class="btn-grid">
          <button class="warning" onclick="purchaseAgain()">Симулировать повторную покупку</button>
          <button class="secondary" onclick="pressOk()">Нажать OK</button>
          <button class="secondary" onclick="pressDontShow()">Нажать «Больше не показывать»</button>
          <button class="secondary" onclick="openToast()">Нажать на toast</button>
          <button class="ghost" onclick="resetAll()">Сбросить состояние</button>
          <button class="ghost" onclick="toggleDemoMode()">Скрыть / показать панель</button>
        </div>
      </div>

      <div class="status" id="statusBox"></div>
    </aside>

    <main class="main">
      <div class="scene">
        <div class="phone-wrap">
          <div class="phone-shell">
            <div class="phone">
              <div class="notch"></div>
              <div class="screen">
                <div class="content" id="app"></div>
                <div class="browser">
                  <div>←</div>
                  <div class="url" id="browserUrl">games-hub.app</div>
                  <div>⋮</div>
                </div>
              </div>
            </div>
          </div>
        </div>

        <section class="notes" id="notes"></section>
      </div>
    </main>
  </div>

  <button class="demo-toggle-fab" onclick="toggleDemoMode()">Показать панель</button>

  <script>
    const state = {
      scene: "success",
      purchaseCount: 1,
      dontShowAgain: false,
      popupOpen: false,
      toastVisible: false,
      autoTimer: null,
      toastTimer: null
    };

    const bonusValue = "120 фишек";

    function clearTimer() {
      if (state.autoTimer) {
        clearTimeout(state.autoTimer);
        state.autoTimer = null;
      }
    }

    function clearToastTimer() {
      if (state.toastTimer) {
        clearTimeout(state.toastTimer);
        state.toastTimer = null;
      }
    }

    function scheduleToastAutoHide() {
      clearToastTimer();
      if (!state.toastVisible) return;
      state.toastTimer = setTimeout(() => {
        state.toastVisible = false;
        if (!state.popupOpen) renderApp();
      }, 5200);
    }

    function toggleDemoMode() {
      document.body.classList.toggle("demo-clean");
    }

    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape" && document.body.classList.contains("demo-clean")) {
        toggleDemoMode();
      }
    });

    function animatePress(selectorOrEl, duration = 220) {
      const el = typeof selectorOrEl === "string" ? document.querySelector(selectorOrEl) : selectorOrEl;
      if (!el) return Promise.resolve();
      el.classList.add("pressing");
      return new Promise((resolve) => {
        setTimeout(() => {
          el.classList.remove("pressing");
          resolve();
        }, duration);
      });
    }

    function humanScene() {
      if (state.scene === "success") return "экран успешного платежа";
      if (state.popupOpen && state.purchaseCount === 1) return "магазин + попап 1";
      if (state.popupOpen && state.purchaseCount >= 2) return "магазин + попап 2+";
      if (state.toastVisible) return "магазин + toast";
      return "магазин";
    }

    function productMarkup(config) {
      return `
        <div class="product ${config.plus ? "plus" : ""}">
          <div class="product-topline">${config.topline}</div>
          <div class="product-art">${config.art}</div>
          <div class="product-body">
            <div class="product-name">${config.name}</div>
            <div class="product-sub">${config.sub}</div>
            <div class="product-stats">${config.stats}</div>
          </div>
          <div class="product-perks">
            <div>${config.perk1}</div>
            <div>${config.perk2}</div>
          </div>
          <div class="product-cta clickable" onclick="simulateCtaTap(this)">
            <div class="bonus">+ ${bonusValue}</div>
            <div class="label">Забрать в Games Hub</div>
          </div>
          <div class="product-price">${config.price}</div>
        </div>
      `;
    }

    function storeMarkup() {
      return `
        <div class="store">
          <div class="topbar">
            <div class="toprow">
              <div class="left-icons">
                <div class="nav-mini"><div class="icon">☰</div><div>Меню</div></div>
                <div class="nav-mini"><div class="icon">✦</div><div>Магазин</div></div>
              </div>
              <div class="profile">
                <div class="profile-copy">
                  <div class="profile-label">VIP 10</div>
                  <div class="profile-name">Галстук</div>
                  <div class="profile-meta">Персональные бонусы активны</div>
                </div>
                <div class="avatar">🧔</div>
              </div>
            </div>
            <div class="vip-banner">Покупки через Games Hub открывают персональный бонус и ускоренный доступ к выгодным офферам сессии.</div>
          </div>

          <div class="store-body">
            <section class="store-section">
              <div class="section-meta">
                <div>
                  <h2 class="section-title">Event Pass</h2>
                  <div class="section-sub">До завершения события: 16:41:42</div>
                </div>
                <div class="section-tag">Premium picks</div>
              </div>

              <div class="cards">
                ${productMarkup({
                  topline: "+ 20K Diamonds",
                  art: "💰",
                  name: "Event Pass",
                  sub: "Сезонные награды и ускоренный прогресс",
                  stats: "⟳ 3.5B + 🎫 1 + 🎟️ 1",
                  perk1: "Моментальный доступ к наградам и контенту сезона",
                  perk2: "Дополнительный бонус GH начисляется после оплаты",
                  price: "$199"
                })}
                ${productMarkup({
                  topline: "+ 50K Diamonds",
                  art: "🎁",
                  name: "Event Pass Plus",
                  sub: "Расширенный пакет с усиленной ценностью",
                  stats: "⟳ 8.75B + 🎫 1 + ⭐ 1",
                  perk1: "Больше редких ресурсов и усиленный темп прогресса",
                  perk2: "Лучшее предложение для повторной покупки в сессии",
                  price: "$499",
                  plus: true
                })}
              </div>
            </section>

            <section class="store-section">
              <div class="section-meta" style="margin-bottom:10px;">
                <div>
                  <h2 class="section-title" style="font-size:22px;">Season Pass</h2>
                  <div class="section-sub">До завершения сезона: 18 дней</div>
                </div>
                <div class="section-tag">Live now</div>
              </div>

              <div class="mini-cards">
                <div class="mini-card">
                  <div class="mini-top">+ 20K Diamonds</div>
                  <div class="mini-art">🎫</div>
                </div>
                <div class="mini-card">
                  <div class="mini-top">+ 50K Diamonds</div>
                  <div class="mini-art">🎁</div>
                </div>
              </div>
            </section>
          </div>

          <div class="bottom-pill">🎟️</div>
          <div class="bottom-nav"><span>◉</span><span>⟲</span><span>◎</span><span>▥</span><span>Ⓖ</span></div>
        </div>
      `;
    }

    function popupMarkup(second = false) {
      const title = second ? "Games Hub уже добавил выгоду к этой покупке" : "С покупкой в Games Hub вы получаете больше";
      const copy = second
        ? "Это повторная покупка в текущей сессии, поэтому бонус уже адаптирован под ваш активный прогресс. Можно оставить полное сообщение или переключиться на лёгкий формат уведомлений."
        : "После оплаты мы сразу показываем ценность Games Hub: бонус начислен, доступ к офферам сохранён, а следующий шаг остаётся простым и ненавязчивым.";
      const benefitTitle = second ? "Бонус повторной покупки" : "Ваш бонус за покупку через GH";
      const benefitSub = second
        ? "Показываем более мягкий контроль частоты, чтобы не мешать следующему действию."
        : "Подтверждаем ценность сразу после оплаты и возвращаем в магазин с понятным CTA.";

      return `
        <div class="overlay"></div>
        <div class="popup-wrap">
          <div class="popup">
            <div class="popup-inner">
              <div class="popup-top">
                <div class="popup-thanks">Спасибо за покупку</div>
                <div class="popup-chip">${second ? "Повторная покупка" : "Покупка подтверждена"}</div>
              </div>

              <div class="popup-hero">
                <h3 class="popup-title">${title}</h3>
                <div class="popup-copy">${copy}</div>
              </div>

              <div class="popup-benefit">
                <div class="benefit-copy">
                  <div class="benefit-label">Бонус Games Hub</div>
                  <div class="benefit-title">${benefitTitle}</div>
                  <div class="benefit-sub">${benefitSub}</div>
                </div>
                <div class="reward-badge">
                  <strong>${bonusValue}</strong>
                  <span>начислено</span>
                </div>
              </div>

              <div class="popup-actions ${second ? "" : "single"}">
                ${second
                  ? '<button class="optout clickable" onclick="pressDontShow()">Больше не показывать</button><button class="ok clickable" onclick="pressOk()">OK</button>'
                  : '<button class="ok clickable" onclick="pressOk()">OK</button>'}
              </div>

              <div class="popup-footnote">
                ${second
                  ? "Если отключить попап, дальше игрок будет получать только лёгкое уведомление о бонусе."
                  : "Сообщение закрывается в один шаг и не уводит игрока из сценария магазина."}
              </div>
            </div>
          </div>
        </div>
      `;
    }

    function toastMarkup() {
      return `
        <div class="toast clickable" onclick="openToast()">
          <div class="icon">✓</div>
          <div>
            <div class="t1">Бонус Games Hub начислен</div>
            <div class="t2">${bonusValue} уже добавлены к этой покупке. Нажмите, чтобы снова открыть подробности.</div>
            <div class="hint">Лёгкий формат вместо попапа</div>
          </div>
        </div>
      `;
    }

    function renderSuccessScreen() {
      return `
        <div class="success-screen">
          <div class="confetti">premium bonus unlocked</div>
          <div class="success-ring">✓</div>
          <div class="success-title">Платёж прошёл успешно</div>
          <div class="success-sub">Покупка подтверждена. Возвращаем вас в магазин и показываем дополнительную выгоду от Games Hub.</div>
        </div>
      `;
    }

    function renderStoreScene() {
      let html = storeMarkup();
      if (state.toastVisible) html += toastMarkup();
      if (state.popupOpen) html += popupMarkup(state.purchaseCount >= 2);
      return html;
    }

    function renderApp() {
      const app = document.getElementById("app");
      const browserUrl = document.getElementById("browserUrl");

      if (state.scene === "success") {
        browserUrl.textContent = "games-hub.app";
        app.innerHTML = renderSuccessScreen();
      } else {
        browserUrl.textContent = "internal.games-hub.app";
        app.innerHTML = renderStoreScene();
      }

      renderNotes();
      renderStatus();
    }

    function renderNotes() {
      const el = document.getElementById("notes");
      let badge = "";
      let title = "";
      let body = "";

      if (state.scene === "success") {
        badge = "Шаг 1";
        title = "Экран успешной оплаты";
        body = `
          <p>Это быстрый экран снятия тревожности после платежа. Он подтверждает оплату, создаёт ощущение завершённости и подготавливает переход обратно в магазин без ощущения разрыва сценария.</p>
          <p>В демо он держится чуть дольше обычного, чтобы лучше считать механику на презентации и показать, что post-purchase коммуникация стартует уже после подтверждённого успеха.</p>
          <p class="muted">Ключевая задача: не продавать повторно слишком рано, а сначала закрепить доверие.</p>
        `;
      } else if (state.popupOpen && state.purchaseCount === 1) {
        badge = "Шаг 2–3";
        title = "Первый попап после покупки";
        body = `
          <p>Это основной monetization touchpoint сразу после возврата в магазин. Попап не спорит с фактом покупки, а объясняет, что Games Hub уже дал дополнительную ценность и усилил оффер.</p>
          <p>На первом показе CTA максимально простой: подтвердить сообщение и продолжить. За счёт этого экран остаётся заметным, но не создаёт лишнего когнитивного шума.</p>
          <p class="muted">Ключевая задача: сформировать у игрока связь «покупка через GH = дополнительная выгода».</p>
        `;
      } else if (state.popupOpen && state.purchaseCount >= 2) {
        badge = "Шаг 4–5";
        title = "Адаптированный попап для повторной покупки";
        body = `
          <p>При повторной покупке в той же сессии коммуникация становится умнее. Мы не просто повторяем первый попап, а даём игроку контроль над дальнейшим форматом показа.</p>
          <p>Так сохраняется заметность бонуса, но уменьшается риск раздражения. Это важный переход от forceful-коммуникации к более деликатному post-purchase UX.</p>
          <p class="muted">Ключевая задача: показать намеренность сценария и уважение к частоте покупок в рамках одной сессии.</p>
        `;
      } else if (state.toastVisible) {
        badge = "Шаг 6";
        title = "Мягкий toast после opt-out";
        body = `
          <p>После выбора «Больше не показывать» полноэкранный попап заменяется лёгким toast-уведомлением. Оно всё ещё подтверждает бонус, но не перекрывает основной store-flow.</p>
          <p>Toast нужен как компромисс: ценность не исчезает полностью, но UX становится заметно мягче и чище для игрока, который уже понял механику.</p>
          <p class="muted">Ключевая задача: сохранить awareness без ощущения навязчивости.</p>
        `;
      } else {
        badge = "Базовый экран";
        title = "Магазин после возврата";
        body = `
          <p>Это основной store-view, в который игрок попадает сразу после подтверждения оплаты. Здесь видны премиальные офферы, текущие цены и достаточно реалистичный контекст для следующего действия.</p>
          <p>С этого же экрана можно инициировать повторную покупку, открыть лёгкий toast или пройти весь сценарий автоматически для внутреннего показа.</p>
          <p class="muted">Ключевая задача: магазин должен выглядеть достаточно убедительно сам по себе, чтобы post-purchase слой воспринимался как часть реального продукта.</p>
        `;
      }

      el.innerHTML = `
        <div class="state-badge">${badge} · Покупок в сессии: ${state.purchaseCount}</div>
        <h2>${title}</h2>
        ${body}
      `;
    }

    function renderStatus() {
      const el = document.getElementById("statusBox");
      el.innerHTML = `
        <div><strong>Текущее состояние:</strong> ${humanScene()}</div>
        <div><strong>Покупок в сессии:</strong> ${state.purchaseCount}</div>
        <div><strong>Полный попап отключён:</strong> ${state.dontShowAgain ? "да" : "нет"}</div>
        <div><strong>Попап открыт:</strong> ${state.popupOpen ? "да" : "нет"}</div>
        <div><strong>Toast виден:</strong> ${state.toastVisible ? "да" : "нет"}</div>
      `;
    }

    function go(scene) {
      clearTimer();
      clearToastTimer();

      if (scene === "success") {
        state.scene = "success";
        state.popupOpen = false;
        state.toastVisible = false;
      }

      if (scene === "store-first") {
        state.scene = "store";
        state.purchaseCount = 1;
        state.popupOpen = true;
        state.toastVisible = false;
        state.dontShowAgain = false;
      }

      if (scene === "store-second") {
        state.scene = "store";
        state.purchaseCount = Math.max(2, state.purchaseCount);
        state.popupOpen = true;
        state.toastVisible = false;
      }

      if (scene === "store-toast") {
        state.scene = "store";
        state.purchaseCount = Math.max(2, state.purchaseCount);
        state.dontShowAgain = true;
        state.popupOpen = false;
        state.toastVisible = true;
      }

      renderApp();
      scheduleToastAutoHide();
    }

    function pressOk() {
      clearToastTimer();
      state.popupOpen = false;
      if (state.dontShowAgain) state.toastVisible = true;
      renderApp();
      scheduleToastAutoHide();
    }

    function pressDontShow() {
      clearToastTimer();
      state.scene = "store";
      state.dontShowAgain = true;
      state.popupOpen = false;
      state.toastVisible = true;
      renderApp();
      scheduleToastAutoHide();
    }

    function openToast() {
      clearToastTimer();
      if (!state.toastVisible) return;
      state.toastVisible = false;
      state.popupOpen = true;
      state.purchaseCount = 1;
      renderApp();
    }

    function purchaseAgain() {
      clearTimer();
      clearToastTimer();
      state.purchaseCount += 1;
      state.scene = "store";

      if (state.dontShowAgain) {
        state.popupOpen = false;
        state.toastVisible = true;
      } else {
        state.popupOpen = true;
        state.toastVisible = false;
      }

      renderApp();
      scheduleToastAutoHide();
    }

    async function simulateCtaTap(el) {
      await animatePress(el, 210);
      state.scene = "success";
      state.popupOpen = false;
      state.toastVisible = false;
      renderApp();

      clearTimer();
      state.autoTimer = setTimeout(() => {
        go(state.purchaseCount >= 2 ? "store-second" : "store-first");
      }, 1650);
    }

    async function simulateFlow() {
      resetAll();
      state.scene = "store";
      renderApp();

      state.autoTimer = setTimeout(async () => {
        const firstCta = document.querySelectorAll(".product-cta")[0];
        await animatePress(firstCta, 220);

        state.scene = "success";
        renderApp();

        state.autoTimer = setTimeout(() => {
          state.scene = "store";
          state.purchaseCount = 1;
          state.popupOpen = true;
          renderApp();

          state.autoTimer = setTimeout(async () => {
            const okBtn = document.querySelector(".popup-actions .ok");
            await animatePress(okBtn, 220);
            pressOk();

            state.autoTimer = setTimeout(async () => {
              const secondCta = document.querySelectorAll(".product-cta")[1] || document.querySelectorAll(".product-cta")[0];
              await animatePress(secondCta, 220);

              state.scene = "success";
              renderApp();

              state.autoTimer = setTimeout(() => {
                state.scene = "store";
                state.purchaseCount = 2;
                state.popupOpen = true;
                renderApp();

                state.autoTimer = setTimeout(async () => {
                  const optoutBtn = document.querySelector(".popup-actions .optout");
                  await animatePress(optoutBtn, 220);
                  pressDontShow();

                  state.autoTimer = setTimeout(() => {}, 2200);
                }, 2800);
              }, 1750);
            }, 2100);
          }, 2850);
        }, 1700);
      }, 1000);
    }

    function resetAll() {
      clearTimer();
      clearToastTimer();
      state.scene = "success";
      state.purchaseCount = 1;
      state.dontShowAgain = false;
      state.popupOpen = false;
      state.toastVisible = false;
      renderApp();
    }

    renderApp();
  </script>
</body>
</html>
