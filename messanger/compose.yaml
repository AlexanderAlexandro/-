services:
  app:
    build:
      context: .
    restart: unless-stopped
    env_file:
      - .env.production
    expose:
      - "8000"
    volumes:
      - messenger_data:/app/data

  caddy:
    image: caddy:2.8-alpine
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    environment:
      APP_DOMAIN: ${APP_DOMAIN}
      ACME_EMAIL: ${ACME_EMAIL}
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  messenger_data:
  caddy_data:
  caddy_config:
